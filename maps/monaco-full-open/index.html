<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monaco - Full Open</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      background: #101214;
      color: #f4f5f6;
      font-family: Arial, Helvetica, sans-serif;
    }
    #game-shell {
      width: 100vw;
      height: 100vh;
      position: absolute;
      inset: 0;
      background: #000;
    }
    #game, #game canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      gap: 14px;
      padding: 24px;
      background: #15191d;
      text-align: center;
      z-index: 2;
    }
    #loading.hidden { display: none; }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
    #status { color: #b9c0c7; font-size: 14px; }
    #progress {
      width: min(420px, 80vw);
      height: 10px;
      overflow: hidden;
      background: #32383e;
      border-radius: 5px;
    }
    #progress-fill {
      width: 0;
      height: 100%;
      background: #24b47e;
      transition: width 120ms linear;
    }
    #error {
      display: none;
      max-width: 680px;
      color: #ff9c9c;
      font: 12px Consolas, monospace;
      white-space: pre-wrap;
      text-align: left;
    }
  </style>
</head>
<body>
  <main id="game-shell">
    <div id="game"></div>
    <section id="loading">
      <h1>Monaco - Full Open</h1>
      <div id="status">Preparando Unity...</div>
      <div id="progress"><div id="progress-fill"></div></div>
      <div id="error"></div>
    </section>
  </main>
  <script src="../../assets/custom-resolution.js?v=1"></script>
  <script src="js/poki-stub.js"></script>
  <script src="../../assets/wasd-controls.js?v=1"></script>
  <script src="../../assets/save-db-scope-monaco.js?v=2"></script>
  <script src="js/4399.z.js"></script>
  <script src="js/UnityLoader.2019.2.js"></script>
  <script src="js/infinite-save.js?v=8"></script>
  <script src="js/local-loader.js?v=8"></script>
</body>
</html>
